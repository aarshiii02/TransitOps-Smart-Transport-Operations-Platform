<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitOps - Secure OTP Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --font-sans: 'Outfit', -apple-system, sans-serif;
            
            /* Curated White & Yellow Palette */
            --bg-page: #fcfbf7;            /* Soft off-white with warm undertones */
            --bg-card: #ffffff;            /* Pure white for the card body */
            --yellow-primary: #facc15;     /* Warm energetic gold/yellow */
            --yellow-hover: #eab308;       /* Deeper yellow for hover states */
            --yellow-light: #fef9c3;       /* Soft light yellow for highlights */
            --yellow-accent: #fef08a;      /* Muted yellow accent border */
            
            --text-dark: #1e293b;          /* Charcoal grey for readability */
            --text-muted: #64748b;         /* Slate grey for subtext */
            --border-color: #e2e8f0;       /* Neutral border */
            
            --border-radius: 16px;
            --shadow: 0 20px 40px -15px rgba(234, 179, 8, 0.15), 0 15px 25px -10px rgba(0, 0, 0, 0.05);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-page);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Abstract Background Aesthetics */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--yellow-light) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
            opacity: 0.8;
        }

        body::before {
            top: -100px;
            right: -100px;
        }

        body::after {
            bottom: -150px;
            left: -100px;
        }

        /* Main Card Layout */
        .login-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 460px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 3rem 2.5rem;
            position: relative;
        }

        /* Yellow Accent Top Indicator */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(to right, var(--yellow-primary), var(--yellow-hover));
        }

        /* Header Aesthetics */
        .header {
            text-align: center;
            margin-bottom: 2.25rem;
        }

        .logo-box {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--yellow-primary), var(--yellow-hover));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            font-size: 1.5rem;
            margin: 0 auto 1.25rem auto;
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
        }

        .title {
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.4rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .phone-display {
            font-weight: 600;
            color: var(--text-dark);
            background-color: var(--bg-page);
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            border: 1px solid var(--yellow-accent);
            font-size: 0.85rem;
        }

        /* Forms Details */
        .form-group {
            margin-bottom: 1.5rem;
        }

        /* OTP Boxes Grid */
        .otp-grid {
            display: flex;
            justify-content: space-between;
            gap: 0.75rem;
            margin: 1.5rem 0;
        }

        .otp-input {
            width: 64px;
            height: 64px;
            background-color: var(--bg-page);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
            outline: none;
            transition: var(--transition);
        }

        .otp-input:focus {
            border-color: var(--yellow-primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.2);
        }

        /* Action Buttons */
        .btn {
            width: 100%;
            padding: 0.9rem;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-dark);
            background-color: var(--yellow-primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(250, 204, 21, 0.2);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background-color: var(--yellow-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(234, 179, 8, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Secondary Links & Helper Text */
        .footer-links {
            text-align: center;
            margin-top: 1.75rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .resend-text {
            margin-bottom: 0.75rem;
        }

        .link-btn {
            background: none;
            border: none;
            color: var(--text-dark);
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: var(--transition);
        }

        .link-btn:hover {
            color: var(--yellow-hover);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-top: 1rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--text-dark);
        }

        /* Warning Tag */
        .mockup-tag {
            text-align: center;
            font-size: 0.75rem;
            background-color: var(--yellow-light);
            border: 1px dashed var(--yellow-primary);
            color: #854d0e;
            padding: 0.5rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <!-- Header -->
        <div class="header">
            <div class="logo-box">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="title">Verify OTP</h1>
            <p class="subtitle">
                We sent a 4-digit verification code to<br>
                <span class="phone-display">+1 (555) 019-9283</span>
            </p>
        </div>

        <!-- Non-working Form Mockup -->
        <form onsubmit="event.preventDefault();">
            <div class="form-group">
                <div class="otp-grid">
                    <input type="text" class="otp-input" maxlength="1" placeholder="•" autofocus>
                    <input type="text" class="otp-input" maxlength="1" placeholder="•">
                    <input type="text" class="otp-input" maxlength="1" placeholder="•">
                    <input type="text" class="otp-input" maxlength="1" placeholder="•">
                </div>
            </div>

            <button type="submit" class="btn">
                <span>Verify & Login</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <!-- Footer / Helpers -->
        <div class="footer-links">
            <p class="resend-text">Didn't receive the code? Wait <span style="font-weight: 600; color: var(--text-dark);">0:29</span></p>
            <button class="resend-btn link-btn" style="opacity: 0.5; cursor: not-allowed;" disabled>Resend OTP</button>
            <br>
            <a href="#" class="back-link">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Back to mobile login</span>
            </a>
        </div>

        <!-- Mockup Notice -->
        <div class="mockup-tag">
            <i class="fa-solid fa-circle-info"></i> Static HTML Mockup. Submit button is non-working.
        </div>

    </div>

</body>
</html>
